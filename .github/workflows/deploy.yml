name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: blog-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_COMMIT_SHA: ${{ github.sha }}
      - name: Checksum dist
        run: |
          cd dist
          find . -type f -exec sha256sum {} \; > ../dist-checksums.txt
          cd ..
      - uses: actions/upload-artifact@v4
        with:
          name: dist-checksums
          path: dist-checksums.txt
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Checkout blog repo
        uses: actions/checkout@v4
        with:
          repository: stuartnelson3/stuartnelson3.github.io
          token: ${{ secrets.BLOG_DEPLOY_TOKEN }}
          path: blog
      - name: Sync dist into blog repo
        # static/ is Hugo's source tree (publishDir=docs copies it verbatim on
        # the next `hugo build`); docs/ is what GitHub Pages actually serves.
        # Both must be updated so a future full Hugo rebuild doesn't diverge.
        run: |
          rm -rf blog/static/utxo-trace blog/docs/utxo-trace
          mkdir -p blog/static/utxo-trace blog/docs/utxo-trace
          cp -r dist/. blog/static/utxo-trace/
          cp -r dist/. blog/docs/utxo-trace/
      - name: Commit and push if changed
        working-directory: blog
        run: |
          git config user.name "utxo-trace-ci"
          git config user.email "actions@users.noreply.github.com"
          git add static/utxo-trace docs/utxo-trace
          if git diff --cached --quiet; then
            echo "no changes to deploy"
            exit 0
          fi
          git commit -m "deploy utxo-trace @ ${GITHUB_SHA}"
          git push origin master

  smoke-test:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Cloudflare fronts stuartnelson.xyz with its own cache TTL, so a
      # freshly pushed build may not be visible immediately; this only
      # affects how soon the smoke test sees it, not the deploy itself.
      - run: sleep 20
      - run: node scripts/smoke-test.mjs
        env:
          SMOKE_TEST_URL: https://stuartnelson.xyz/utxo-trace/
